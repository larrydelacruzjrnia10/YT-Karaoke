# Nginx config for Karaoke Reservation System
# Replace YOUR_DOMAIN with your actual domain before running setup-vps.sh
# Certbot will automatically add the SSL server block when you run it.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    root /var/www/karaoke/client/dist;
    index index.html;

    # SPA fallback — React Router handles all non-file paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API proxy → Node.js on port 3001
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # WebSocket proxy — must set Upgrade headers for the handshake
    location /ws {
        proxy_pass             http://127.0.0.1:3001;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;   # keep WS alive for up to 1 hour
        proxy_send_timeout     3600s;
    }

    # Don't expose .env or db files if somehow placed in webroot
    location ~* \.(env|db|db-shm|db-wal)$ {
        deny all;
    }
}
