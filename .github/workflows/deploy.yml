name: Deploy to Hostinger VPS

on:
  push:
    branches: [master]

# Prevent overlapping deploys if two pushes arrive close together
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # All commands run on the VPS as the configured user
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd /var/www/karaoke
            git pull origin master

            echo "=== Updating server dependencies ==="
            cd server
            npm install --omit=dev

            echo "=== Building client ==="
            cd ../client
            npm install
            npm run build

            echo "=== Restarting server via PM2 ==="
            cd ../server
            # Pass config file so PM2 re-reads it (triggers dotenv.config() → picks up .env)
            pm2 describe karaoke-server > /dev/null 2>&1 \
              && pm2 restart ecosystem.config.cjs \
              || pm2 start ecosystem.config.cjs
            pm2 save

            echo "=== Deploy complete: $(date) ==="
